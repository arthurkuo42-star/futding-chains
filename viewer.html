/* ── 載入中動畫 ── */
#loading {
  position: fixed; top: 0; left: 0; right: 0; bottom: 0;

  flex-direction: column; gap: 12px; font-size: 14px; color: #8A6200;
}
.spinner {
  width: 32px; height: 32px; border: 3px solid #E8D090;
  border-top-color: #C8971C; border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ══ 手機 RWD ══ */
@media (max-width: 768px) {
  body { padding: 3mm; }

  /* 橫幅縮排 */
  .top-banner { flex-direction: column; gap: 2mm; padding: 3mm; text-align: center; }
  .main-title h1 { font-size: 13pt; letter-spacing: 0.5pt; }
  .slogan-box { min-width: unset; width: 100%; }
  .slogan-line1 { font-size: 11pt; letter-spacing: 1.5pt; }
  .slogan-line2 { font-size: 8.5pt; }
  .diamond { display: none; }

  /* 卡片：改成單欄 */
  .grid { grid-template-columns: 1fr; gap: 2.5mm; }

  /* 卡片標頭：可點擊折疊 */
  .card-head {
    cursor: pointer;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 8px;
    padding: 3mm 3.5mm;
    user-select: none;
  }
  .card-head-text { flex: 1; }
  .card-head-name { font-size: 13pt; }
  .card-head-aud  { font-size: 8pt; margin-top: 2pt; }
  .toggle-arrow {
    font-size: 14px;
    color: rgba(255,255,255,0.6);
    flex-shrink: 0;
    margin-top: 3px;
    transition: transform 0.25s;
    line-height: 1;
  }
  .card.open .toggle-arrow { transform: rotate(180deg); }

  /* 內容預設隱藏，open 時展開 */
  .card-body { display: none; }
  .card.open .card-body { display: block; }

  /* 小組左右欄改成上下排列 */
  .group-row {
    grid-template-columns: 1fr;
    gap: 4pt 0;
  }
  .col-divider {
    height: 0.5pt;
    width: 100%;
    background: #E8D090;
    margin: 4pt 0;
  }

  /* 字體放大適配手機 */
  .m-name  { font-size: 14pt; }
  .m-role  { font-size: 9pt; }
  .collab-name { font-size: 11pt; }
  .group-label { font-size: 7.5pt; }
  .collab-section-label { font-size: 7.5pt; }

  /* 狀態列縮排 */
  #status-bar { flex-wrap: wrap; font-size: 10px; padding: 5px 10px; }
  #status-bar .badge { font-size: 9px; }

  /* 展開提示文字 */
  .tap-hint {
    display: block;
    text-align: center;
    font-size: 10px;
    color: rgba(255,248,220,0.55);
    margin-top: 2mm;
    letter-spacing: 0.3pt;
  }
  .gold-rule { margin-bottom: 2mm; }
  .footer { font-size: 8pt; padding: 3mm 0; }
}

/* 桌機：隱藏手機元素 */
@media (min-width: 769px) {
  .tap-hint { display: none; }
  .toggle-arrow { display: none; }
  .card-body { display: block !important; }
  .card-head { cursor: default; }
}

const DOT_COLORS = {
  'ac-purple':'#7060C8','ac-coral':'#C84820','ac-amber':'#B88A00',
  'ac-teal':'#108870','ac-green':'#448820','ac-pink':'#C03870',
  'ac-gray':'#806848','ac-blue':'#1858B8'
};
function dotColor(ac) { return DOT_COLORS[ac] || '#B88A00'; }

// ── 建立會員行（唯讀）──
function makeMemberRow(name, role, dc) {
  const row = document.createElement('div');
  row.className = 'member-item';
  const dot = document.createElement('div');
  dot.className = 'm-dot'; dot.style.background = dc;
  const txt = document.createElement('div');
  const n = document.createElement('div'); n.className = 'm-name'; n.textContent = name;
  const r = document.createElement('div'); r.className = 'm-role'; r.textContent = role;
  txt.appendChild(n); txt.appendChild(r);
  row.appendChild(dot); row.appendChild(txt);
  return row;
}

// ── 建立合作行（唯讀）──
function makeCollabRow(text) {
  const row = document.createElement('div');
  row.className = 'collab-item';
  const o = document.createElement('div'); o.className = 'collab-o'; o.textContent = '○';
  const t = document.createElement('div'); t.className = 'collab-name'; t.textContent = text;
  row.appendChild(o); row.appendChild(t);
  return row;
}

// ── 建立卡片（唯讀）──
function buildCard(chain) {
  const card = document.createElement('div');
  card.className = 'card ' + chain.ac;
  const dc = dotColor(chain.ac);

  const head = document.createElement('div'); head.className = 'card-head';

  // 文字區塊
  const headText = document.createElement('div'); headText.className = 'card-head-text';
  const nm  = document.createElement('div'); nm.className  = 'card-head-name'; nm.textContent = chain.name;
  const aud = document.createElement('div'); aud.className = 'card-head-aud';  aud.textContent = chain.aud;
  headText.appendChild(nm); headText.appendChild(aud);

  // 折疊箭頭（手機才顯示）
  const arrow = document.createElement('span'); arrow.className = 'toggle-arrow'; arrow.textContent = '▼';

  head.appendChild(headText); head.appendChild(arrow);

  // 點擊標頭折疊／展開（只在手機有效）
  head.addEventListener('click', () => {
    if (window.innerWidth <= 768) card.classList.toggle('open');
  });

  card.appendChild(head);

  const body = document.createElement('div'); body.className = 'card-body';

  chain.groups.forEach((grp, gi) => {
    if (gi > 0) { const sep = document.createElement('hr'); sep.className = 'group-sep'; body.appendChild(sep); }
    if (grp.label) {
      const lbl = document.createElement('div');
      lbl.className = 'group-label'; lbl.textContent = grp.label;
      body.appendChild(lbl);
    }
    const row = document.createElement('div'); row.className = 'group-row';

    const left = document.createElement('div');
    grp.members.forEach(([n,r]) => left.appendChild(makeMemberRow(n, r, dc)));

    const div = document.createElement('div'); div.className = 'col-divider';

    const right = document.createElement('div');
    const collabLabel = document.createElement('div');
    collabLabel.className = 'collab-section-label'; collabLabel.textContent = '招募專業別';
    right.appendChild(collabLabel);
    grp.collab.forEach(c => right.appendChild(makeCollabRow(c)));

    row.appendChild(left); row.appendChild(div); row.appendChild(right);
    body.appendChild(row);
  });

  card.appendChild(body);
  return card;
}

// ── 全頁渲染 ──
function renderAll(data) {
  document.getElementById('poster-title').textContent   = data.title    || '';
  document.getElementById('poster-subtitle').textContent= data.subtitle || '';
  document.getElementById('slogan1').textContent         = data.slogan1  || '';
  document.getElementById('slogan2').textContent         = data.slogan2  || '';
  document.getElementById('poster-footer').textContent  = data.footer   || '';
  const grid = document.getElementById('main-grid');
  grid.innerHTML = '';
  (data.chains || []).forEach(c => grid.appendChild(buildCard(c)));
}

// ── 從雲端載入 ──
async function loadFromCloud() {
  try {
    const res = await fetch(JSONBIN_URL + '/latest', {
      headers: { 'X-Master-Key': JSONBIN_API_KEY }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const json = await res.json();
    const data = json.record;
    if (data && data.chains && data.chains.length > 0) {
      renderAll(data);
      // 顯示更新時間
      const meta = json.metadata;
      if (meta && meta.createdAt) {
        const d = new Date(meta.createdAt);
        const ts = d.toLocaleDateString('zh-TW') + ' ' + d.toLocaleTimeString('zh-TW', {hour:'2-digit',minute:'2-digit'});
        document.getElementById('update-time').textContent = '最後更新：' + ts;
      }
    } else {
      renderAll(DEFAULT_DATA);
      document.getElementById('update-time').textContent = '顯示預設資料';
    }
  } catch(err) {
    renderAll(DEFAULT_DATA);
    document.getElementById('update-time').textContent = '無法連線雲端，顯示預設資料';
  } finally {
    document.getElementById('loading').style.display = 'none';
  }
}

// 初始化
renderAll(DEFAULT_DATA);
loadFromCloud();

// 手機版：預設展開第一張卡片
function openFirstCard() {
  if (window.innerWidth <= 768) {
    const first = document.querySelector('#main-grid .card');
    if (first) first.classList.add('open');
  }
}
// 每次 renderAll 後重設
const _origRenderAll = renderAll;
window.renderAll = function(data) {
  _origRenderAll(data);
  setTimeout(openFirstCard, 50);
};

// ══ 匯出高解析圖片 ══
async function exportImage() {
  const btn = document.getElementById('export-btn');
  const overlay = document.getElementById('export-overlay');
  const msg = document.getElementById('exp-msg');

  // 確認 html2canvas 已載入
  if (typeof html2canvas === 'undefined') {
    alert('❌ 圖片套件載入失敗，請確認網路連線後重新整理頁面再試。');
    return;
  }

  btn.disabled = true;
  overlay.classList.add('show');
  msg.textContent = '正在產生高解析圖片…';

  // 暫時隱藏工具列與狀態列
  const statusBar = document.getElementById('status-bar');
  const loading   = document.getElementById('loading');
  statusBar.style.display = 'none';

  try {
    // 等待字體與圖片載入完成
    await document.fonts.ready;
    await new Promise(r => setTimeout(r, 300));

    msg.textContent = '截圖中，請稍候…';

    const canvas = await html2canvas(document.body, {
      scale: 3,              // 3 倍解析度，適合 LINE 傳送
      useCORS: true,
      allowTaint: false,
      backgroundColor: '#FDFAF2',
      logging: false,
      windowWidth: document.body.scrollWidth,
      windowHeight: document.body.scrollHeight,
      x: 0,
      y: 0,
      width: document.body.scrollWidth,
      height: document.body.scrollHeight,
      ignoreElements: el =>
        el.id === 'export-overlay' ||
        el.id === 'loading' ||
        el.id === 'status-bar'
    });

    msg.textContent = '下載中…';

    // 轉成 PNG 並下載
    const link = document.createElement('a');
    const now = new Date();
    const ts = now.getFullYear() + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
    link.download = '富鼎分會_產業服務鏈_' + ts + '.png';
    link.href = canvas.toDataURL('image/png', 1.0);
    link.click();

  } catch(err) {
    alert('❌ 匯出失敗：' + err.message + '\n\n建議改用 Chrome 瀏覽器，或用 F12 → Capture full size screenshot。');
  } finally {
    statusBar.style.display = '';
    overlay.classList.remove('show');
    btn.disabled = false;
  }
}
