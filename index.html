  color: var(--drag-handle-color, #C8B870);

// ══ 從 DOM 讀取目前狀態 ══
function readCurrentData() {
  const data = {
    title:    document.getElementById('poster-title').innerText,
    subtitle: document.getElementById('poster-subtitle').innerText,
    slogan1:  document.getElementById('slogan1').innerText,
    slogan2:  document.getElementById('slogan2').innerText,
    footer:   document.getElementById('poster-footer').innerText,
    chains: []
  };

  document.querySelectorAll('#main-grid .card').forEach(card => {
    const ac = [...card.classList].find(c => c.startsWith('ac-'));
    const chain = {
      ac,
      name: card.querySelector('.card-head-name').innerText,
      aud:  card.querySelector('.card-head-aud').innerText,
      groups: []
    };

    // 找每個 group-row 上方的 group-label
    const body = card.querySelector('.card-body');
    const children = [...body.children];
    let currentLabel = null;

    children.forEach(el => {
      if (el.classList.contains('group-label')) {
        currentLabel = el.innerText;
      } else if (el.classList.contains('group-row')) {
        const members = [];
        el.querySelectorAll('.member-item').forEach(row => {
          const nm   = row.querySelector('.m-name');
          const role = row.querySelector('.m-role');
          if (nm) members.push([nm.innerText, role ? role.innerText : '']);
        });
        const collab = [];
        el.querySelectorAll('.collab-name').forEach(c => collab.push(c.innerText));
        chain.groups.push({ label: currentLabel || '', members, collab });
        currentLabel = null;
      }
    });

    data.chains.push(chain);
  });

  return data;
}

function saveBackup() {
  const data = readCurrentData();
  const now  = new Date();
  const ts   = `${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}`;
  const json = JSON.stringify(data, null, 2);

  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href     = url;
  a.download = `富鼎分會_產業服務鏈備份_${ts}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('✅ 備份已下載！檔名：富鼎分會_產業服務鏈備份_' + ts + '.json');
}

// ══ 備份匯入 ══
function loadBackup(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      renderAll(data);
      showToast('✅ 備份已成功匯入！');
    } catch(err) {
      alert('❌ 備份檔格式錯誤，請確認是正確的 .json 備份檔。');
    }
  };
  reader.readAsText(file);
  event.target.value = ''; // 允許重複載入同一檔案
}

let dragSrc = null;
let dragSrcParent = null;
function clearDropZones() {
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  document.querySelectorAll('.drop-zone-active').forEach(el => el.classList.remove('drop-zone-active'));

// ══ 取得 dot 顏色 ══
const DOT_COLORS = {
  'ac-purple':'#7060C8','ac-coral':'#C84820','ac-amber':'#B88A00',
  'ac-teal':'#108870','ac-green':'#448820','ac-pink':'#C03870',
  'ac-gray':'#806848','ac-blue':'#1858B8'
};
function dotColor(ac) { return DOT_COLORS[ac] || '#B88A00'; }

// ══ 建立會員行 ══
function makeMemberRow(name, role, dc) {
  const row = document.createElement('div');
  row.className = 'member-item';
  row.draggable = true;

  // 拖拉把手
  const handle = document.createElement('span');
  handle.className = 'drag-handle';
  handle.textContent = '⠿';
  handle.title = '拖拉移動';

  const dot = document.createElement('div');
  dot.className = 'm-dot';
  dot.style.background = dc;
  const txt = document.createElement('div');
  txt.style.flex = '1';
  const n = document.createElement('div');
  n.className = 'm-name'; n.contentEditable = 'true'; n.textContent = name;
  const r = document.createElement('div');
  r.className = 'm-role'; r.contentEditable = 'true'; r.textContent = role;
  txt.appendChild(n); txt.appendChild(r);
  const del = document.createElement('button');
  del.className = 'del-btn'; del.textContent = '×';
  del.onclick = () => row.remove();

  row.appendChild(handle);
  row.appendChild(dot);
  row.appendChild(txt);
  row.appendChild(del);

  // ── 拖拉事件（支援跨小組、跨服務鏈）──
  row.addEventListener('dragstart', e => {
    e.stopPropagation();
    dragSrc = row;
    dragSrcParent = row.parentElement;
    setTimeout(() => row.classList.add('dragging'), 0);
    e.dataTransfer.effectAllowed = 'move';
  });
  row.addEventListener('dragend', () => {
    row.classList.remove('dragging');
    clearDropZones();
    dragSrc = null;
    dragSrcParent = null;
  });
  row.addEventListener('dragover', e => {
    e.preventDefault();
    e.stopPropagation();
    e.dataTransfer.dropEffect = 'move';
    if (dragSrc && dragSrc !== row) {
      clearDropZones();
      row.classList.add('drag-over');
    }
  });
  row.addEventListener('dragleave', e => {
    if (!row.contains(e.relatedTarget)) row.classList.remove('drag-over');
  });
  row.addEventListener('drop', e => {
    e.preventDefault(); e.stopPropagation();
    row.classList.remove('drag-over');
    if (!dragSrc || dragSrc === row) return;
    const tgtParent = row.parentElement;
    // 移到目標行前面或後面
    const rows = [...tgtParent.querySelectorAll('.member-item')];
    const tgtIdx = rows.indexOf(row);
    const srcInSame = dragSrc.parentElement === tgtParent;
    const srcIdx = srcInSame ? rows.indexOf(dragSrc) : -1;
    if (srcInSame && srcIdx < tgtIdx) {
      tgtParent.insertBefore(dragSrc, row.nextSibling);
    } else {
      tgtParent.insertBefore(dragSrc, row);
    }
  });

  return row;
}

}

// ══ 建立卡片 ══
function buildCard(chain) {
  const card = document.createElement('div');
  card.className = 'card ' + chain.ac;
  const dc = dotColor(chain.ac);

  // 刪除服務鏈按鈕
  const delChainBtn = document.createElement('button');
  delChainBtn.className = 'del-chain-btn';
  delChainBtn.textContent = '✕ 刪除此服務鏈';
  delChainBtn.onclick = () => {
    if (confirm('確定要刪除「' + chain.name + '」整條服務鏈嗎？')) card.remove();
  };
  card.appendChild(delChainBtn);

  const head = document.createElement('div');
  head.className = 'card-head';
  const nm = document.createElement('div');
  nm.className = 'card-head-name'; nm.contentEditable = 'true'; nm.textContent = chain.name;
  const aud = document.createElement('div');
  aud.className = 'card-head-aud'; aud.contentEditable = 'true'; aud.textContent = chain.aud;
  head.appendChild(nm); head.appendChild(aud);
  card.appendChild(head);

  const body = document.createElement('div');
  body.className = 'card-body';

  chain.groups.forEach((grp, gi) => {
    if (gi > 0) {
      const sep = document.createElement('hr');
      sep.className = 'group-sep';
      body.appendChild(sep);
    }
    if (grp.label) {
      const lbl = document.createElement('div');
      lbl.className = 'group-label'; lbl.contentEditable = 'true'; lbl.textContent = grp.label;
      body.appendChild(lbl);
    }
    const row = document.createElement('div');
    row.className = 'group-row';

    const left = document.createElement('div');
    grp.members.forEach(([n,r]) => left.appendChild(makeMemberRow(n, r, dc)));
    const addM = document.createElement('button');
    addM.className = 'add-member-btn'; addM.textContent = '＋ 新增會員';
    addM.onclick = () => {
      const nr = makeMemberRow('姓名','專業別', dc);
      left.insertBefore(nr, addM);
      nr.querySelector('.m-name').focus();
    };
    left.appendChild(addM);

    const div = document.createElement('div');
    div.className = 'col-divider';

    const right = document.createElement('div');
    const collabLabel = document.createElement('div');
    collabLabel.className = 'collab-section-label';
    collabLabel.textContent = '招募專業別';
    right.appendChild(collabLabel);
    grp.collab.forEach(c => right.appendChild(makeCollabRow(c)));
    const addC = document.createElement('button');
    addC.className = 'add-collab-btn'; addC.textContent = '＋ 新增合作對象';
    addC.onclick = () => {
      const nr = makeCollabRow('建議合作專業別');
      right.insertBefore(nr, addC);
      nr.querySelector('.collab-name').focus();
    };
    right.appendChild(addC);

    row.appendChild(left); row.appendChild(div); row.appendChild(right);
    body.appendChild(row);
  });

  // 新增小組按鈕
  const addGrpBtn = document.createElement('button');
  addGrpBtn.className = 'add-group-btn';
  addGrpBtn.textContent = '＋ 新增小組';
  addGrpBtn.onclick = () => addGroupToCard(body, dc, chain.ac);
  body.appendChild(addGrpBtn);

  card.appendChild(body);
  return card;
}

// ══ 動態新增小組到卡片 ══
function addGroupToCard(body, dc, ac) {
  const labelText = prompt('小組名稱（可留空，代表無小組標籤）：', '');
  if (labelText === null) return; // 取消

  // 在「新增小組」按鈕前插入
  const addGrpBtn = body.querySelector('.add-group-btn');

  // 分隔線
  const sep = document.createElement('hr');
  sep.className = 'group-sep';
  body.insertBefore(sep, addGrpBtn);

  // 小組標籤（含刪除整組按鈕）
  if (labelText.trim()) {
    const lblRow = document.createElement('div');
    lblRow.style.display = 'flex'; lblRow.style.alignItems = 'center'; lblRow.style.marginBottom = '1.5pt';
    const lbl = document.createElement('span');
    lbl.className = 'group-label'; lbl.contentEditable = 'true'; lbl.textContent = labelText;
    const delGrp = document.createElement('button');
    delGrp.className = 'del-group-btn'; delGrp.textContent = '✕ 刪除小組';
    delGrp.onclick = () => {
      if (confirm('確定要刪除「' + lbl.textContent + '」小組嗎？')) {
        // 刪除從這個 lblRow 到下一個 group-sep 或 add-group-btn 之前的所有元素
        const toRemove = [sep, lblRow];
        let el = lblRow.nextElementSibling;
        while (el && !el.classList.contains('add-group-btn') && !el.classList.contains('group-sep')) {
          toRemove.push(el); el = el.nextElementSibling;
        }
        toRemove.forEach(e => e.remove());
      }
    };
    lblRow.appendChild(lbl); lblRow.appendChild(delGrp);
    body.insertBefore(lblRow, addGrpBtn);
  }

  // group-row（左：會員，右：合作）

  });
  left.addEventListener('dragleave', e => {
    if (!left.contains(e.relatedTarget)) left.classList.remove('drop-zone-active');
  });
  left.addEventListener('drop', e => {
    const overItem = e.target.closest('.member-item');
    if (overItem || !dragSrc) return;
    e.preventDefault(); e.stopPropagation();
    left.classList.remove('drop-zone-active');
    const addBtn = left.querySelector('.add-member-btn');
    left.insertBefore(dragSrc, addBtn);
  });
  const newM = makeMemberRow('姓名','專業別', dc);
  left.appendChild(newM);
  const addM = document.createElement('button');
  addM.className = 'add-member-btn'; addM.textContent = '＋ 新增會員';
  addM.onclick = () => {
    const nr = makeMemberRow('姓名','專業別', dc);

  };
  left.appendChild(addM);

  const divEl = document.createElement('div');

  const right = document.createElement('div');
  const collabLabel = document.createElement('div');
  collabLabel.className = 'collab-section-label'; collabLabel.textContent = '招募專業別';
  right.appendChild(collabLabel);
  const newC = makeCollabRow('建議合作專業別');
  right.appendChild(newC);
  const addC = document.createElement('button');
  addC.className = 'add-collab-btn'; addC.textContent = '＋ 新增合作對象';
  addC.onclick = () => {
    const nr = makeCollabRow('建議合作專業別');
    right.insertBefore(nr, addC); nr.querySelector('.collab-name').focus();
  };
  right.appendChild(addC);

  row.appendChild(left); row.appendChild(divEl); row.appendChild(right);
  body.insertBefore(row, addGrpBtn);
  newM.querySelector('.m-name').focus();
}


// ══ 色系選項 ══
const ACCENT_OPTIONS = [
  {ac:'ac-purple', color:'#7060C8', label:'紫'},
  {ac:'ac-coral',  color:'#C84820', label:'橘紅'},
  {ac:'ac-amber',  color:'#B88A00', label:'金'},
  {ac:'ac-teal',   color:'#108870', label:'青'},
  {ac:'ac-green',  color:'#448820', label:'綠'},
  {ac:'ac-pink',   color:'#C03870', label:'粉'},
  {ac:'ac-gray',   color:'#806848', label:'灰'},
  {ac:'ac-blue',   color:'#1858B8', label:'藍'},
];
let selectedAc = 'ac-teal';

function openAddChainModal() {
  selectedAc = 'ac-teal';
  document.getElementById('new-chain-name').value = '';
  document.getElementById('new-chain-aud').value = '';
  document.getElementById('new-chain-group').value = '';
  // 建立色系格
  const grid = document.getElementById('color-grid');
  grid.innerHTML = '';
  ACCENT_OPTIONS.forEach(opt => {
    const div = document.createElement('div');
    div.className = 'color-opt' + (opt.ac === selectedAc ? ' selected' : '');
    div.style.background = opt.color;
    div.title = opt.label;
    div.onclick = () => {
      selectedAc = opt.ac;
      grid.querySelectorAll('.color-opt').forEach(d => d.classList.remove('selected'));
      div.classList.add('selected');
    };
    grid.appendChild(div);
  });
  document.getElementById('add-chain-modal').classList.add('open');
  setTimeout(() => document.getElementById('new-chain-name').focus(), 100);
}

function closeAddChainModal() {
  document.getElementById('add-chain-modal').classList.remove('open');
}

function confirmAddChain() {
  const name  = document.getElementById('new-chain-name').value.trim();
  const aud   = document.getElementById('new-chain-aud').value.trim();
  const grpLbl= document.getElementById('new-chain-group').value.trim();
  if (!name) { alert('請填寫服務鏈名稱'); return; }
  const newChain = {
    ac: selectedAc,
    name,
    aud: aud || '客群：',
    groups: [{ label: grpLbl, members: [['姓名','專業別']], collab: ['建議合作專業別'] }]
  };
  const grid = document.getElementById('main-grid');
  grid.appendChild(buildCard(newChain));
  closeAddChainModal();
  showToast('✅ 已新增「' + name + '」服務鏈！記得按☁️儲存到雲端。');
}

// 點擊遮罩關閉
document.getElementById('add-chain-modal').addEventListener('click', function(e){
  if (e.target === this) closeAddChainModal();
});

// ══ 全頁渲染 ══
function renderAll(data) {
  document.getElementById('poster-title').innerText   = data.title    || '';
  document.getElementById('poster-subtitle').innerText= data.subtitle || '';
  document.getElementById('slogan1').innerText         = data.slogan1  || '';
  document.getElementById('slogan2').innerText         = data.slogan2  || '';
  document.getElementById('poster-footer').innerText  = data.footer   || '';
  const grid = document.getElementById('main-grid');
  grid.innerHTML = '';
  (data.chains || []).forEach(c => grid.appendChild(buildCard(c)));
}

// 初始化：先顯示預設資料，再自動從雲端載入
renderAll(DEFAULT_DATA);
autoLoadFromCloud();
</script>

<!-- ══ 新增服務鏈 Modal ══ -->
<div class="modal-overlay" id="add-chain-modal">
  <div class="modal-box">
    <h3>➕ 新增產業服務鏈</h3>
    <label>服務鏈名稱</label>
    <input type="text" id="new-chain-name" placeholder="例：健康美容服務團隊">
    <label>目標客群說明</label>
    <input type="text" id="new-chain-aud" placeholder="例：客群：30-50歲注重養生的消費者">
    <label>第一個小組名稱（可空白）</label>
    <input type="text" id="new-chain-group" placeholder="例：美容保養組（空白則不建立小組）">
    <label>色系</label>
    <div class="color-grid" id="color-grid"></div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeAddChainModal()">取消</button>
      <button class="btn-modal-ok" onclick="confirmAddChain()">新增</button>
    </div>
  </div>
</div>
</body>
</html>
